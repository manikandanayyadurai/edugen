<!DOCTYPE html>
<html>
<head>
<title>Club Coordinator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Segoe UI;background:#e6fffa;}
.sidebar{
  width:230px;height:100vh;position:fixed;
  background:linear-gradient(180deg,#009688,#00695c);
  padding-top:30px;color:white;
}
.sidebar a{
  display:block;color:white;text-decoration:none;
  padding:15px 25px;transition:0.3s;
}
.sidebar a:hover{
  background:rgba(255,255,255,0.2);
}
.content{margin-left:230px;padding:40px;}
.form-card{
  background:white;padding:30px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  animation:fadeIn 1s ease;
}
input,textarea,button{
  width:100%;padding:10px;margin-top:10px;
}
button{
  background:#009688;color:white;
  border:none;border-radius:8px;
}
.status{
  display:flex;gap:20px;margin-top:30px;
}
.status-card{
  flex:1;background:white;padding:20px;
  border-radius:10px;
  box-shadow:0 10px 20px rgba(0,0,0,0.1);
  transition:0.3s;
}
.status-card:hover{
  transform:scale(1.05);
}

@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}
</style>
</head>

<body>

<div class="sidebar">
<h2 style="text-align:center;">Club</h2>
<a href="#">Dashboard</a>
<a href="#">Create Event</a>
<a href="#">My Events</a>
<a href="Home.html">Logout</a>
</div>

<div class="content">

<div class="form-card">
<h3>Submit Event Proposal</h3>
<input type="text" placeholder="Event Title">
<textarea placeholder="Event Description"></textarea>
<input type="date">
<button onclick="submitEvent()">Submit</button>
</div>

<div class="status">
<div class="status-card">
<h4>Pending</h4>
<p>2 Events</p>
</div>
<div class="status-card">
<h4>Approved</h4>
<p>5 Events</p>
</div>
<div class="status-card">
<h4>Rejected</h4>
<p>1 Event</p>
</div>
</div>

</div>

<script>
function submitEvent(){
 alert("Event Submitted Successfully!");
}
</script>

</body>
</html>
