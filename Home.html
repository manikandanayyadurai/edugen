<!DOCTYPE html>
<html>
<head>
<title>EduManage | Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#0f4c81,#1b6ca8);
  color:white;
  overflow-x:hidden;
}

nav {
  display:flex;
  justify-content:space-between;
  padding:20px 60px;
  animation: slideDown 1s ease;
}

nav a {
  color:white;
  margin-left:20px;
  text-decoration:none;
  font-weight:500;
}

.hero {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:100px 60px;
}

.hero-text {
  width:50%;
  animation: fadeInLeft 1.5s ease;
}

.hero h1 {
  font-size:42px;
}

.btn {
  background:#ff7a00;
  padding:12px 25px;
  border-radius:8px;
  text-decoration:none;
  color:white;
  margin-right:15px;
  transition:0.3s;
}

.btn:hover {
  transform:scale(1.05);
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.hero img {
  width:400px;
  animation: float 4s infinite ease-in-out;
}

@keyframes fadeInLeft {
  from {opacity:0; transform:translateX(-50px);}
  to {opacity:1; transform:translateX(0);}
}

@keyframes slideDown {
  from {opacity:0; transform:translateY(-40px);}
  to {opacity:1; transform:translateY(0);}
}

@keyframes float {
  0%{transform:translateY(0px);}
  50%{transform:translateY(-20px);}
  100%{transform:translateY(0px);}
}
</style>
</head>

<body>

<nav>
  <h2>EduManage</h2>
  <div>
    <a href="Home.html">Home</a>
    <a href="About.html">About</a>
    <a href="Contact.html">Contact</a>
    <a href="Login.html">Login</a>
  </div>
</nav>

<section class="hero">
  <div class="hero-text">
    <h1>Integrated Academic & Exam Management System</h1>
    <p>Manage schedules, hall tickets & campus events efficiently.</p>
    <br>
    <a href="Login.html" class="btn">Get Started</a>
    <a href="About.html" class="btn" style="background:white;color:#0f4c81;">Learn More</a>
  </div>

  <!-- Add hero-illustration.png -->
  <img src="hero-illustration.png">
</section>

</body>
</html>
