<!DOCTYPE html>
<html>
<head>
<title>Login | EduManage</title>

<style>
body{
  font-family:Segoe UI;
  background:#f5f7fa;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:white;
  padding:40px;
  border-radius:15px;
  box-shadow:0 15px 40px rgba(0,0,0,0.1);
  animation:zoom 0.8s ease;
}

select,button{
  width:100%;
  padding:12px;
  margin-top:15px;
}

button{
  background:#0f4c81;
  color:white;
  border:none;
  border-radius:8px;
}

@keyframes zoom{
  from{transform:scale(0.8);opacity:0}
  to{transform:scale(1);opacity:1}
}
</style>
</head>

<body>

<div class="card">
<h2>Select Role</h2>

<select id="role">
<option value="Student.html">Student</option>
<option value="Admin.html">Admin</option>
<option value="Seating.html">Seating Manager</option>
<option value="Club.html">Club Coordinator</option>
</select>

<button onclick="login()">Login</button>
</div>

<script>
function login(){
  var role = document.getElementById("role").value;
  window.location.href = role;
}
</script>

</body>
</html>
