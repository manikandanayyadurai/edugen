<!DOCTYPE html>
<html>
<head>
<title>Seating Manager</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Segoe UI;background:#f3f0ff;}
.sidebar{
  width:230px;height:100vh;position:fixed;
  background:linear-gradient(180deg,#5f27cd,#341f97);
  padding-top:30px;color:white;
}
.sidebar a{
  display:block;color:white;text-decoration:none;
  padding:15px 25px;transition:0.3s;
}
.sidebar a:hover{
  background:rgba(255,255,255,0.2);
}
.content{margin-left:230px;padding:40px;}
.box{
  background:white;padding:30px;
  border-radius:15px;margin-bottom:30px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  animation:fadeUp 1s ease;
}
input,button{
  padding:10px;margin-top:10px;
  width:100%;
}
button{
  background:#5f27cd;color:white;
  border:none;border-radius:8px;
}
button:hover{background:#341f97;}

.seating-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;margin-top:20px;
}
.seat{
  background:#dcd6f7;padding:15px;
  text-align:center;border-radius:8px;
  animation:pop 0.5s ease;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(30px);}
  to{opacity:1;transform:translateY(0);}
}
@keyframes pop{
  from{transform:scale(0);}
  to{transform:scale(1);}
}
</style>
</head>

<body>

<div class="sidebar">
<h2 style="text-align:center;">Seating</h2>
<a href="#">Dashboard</a>
<a href="#">Input Data</a>
<a href="#">Generate Seating</a>
<a href="Home.html">Logout</a>
</div>

<div class="content">

<div class="box">
<h3>Generate Seating Arrangement</h3>
<input type="number" id="students" placeholder="Number of Students">
<button onclick="generate()">Generate</button>
</div>

<div class="box">
<h3>Seating Chart</h3>
<div class="seating-grid" id="grid"></div>
</div>

</div>

<script>
function generate(){
 let n=document.getElementById("students").value;
 let grid=document.getElementById("grid");
 grid.innerHTML="";
 for(let i=1;i<=n;i++){
   grid.innerHTML+=`<div class="seat">S${i}</div>`;
 }
}
</script>

</body>
</html>
