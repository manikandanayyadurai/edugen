<!DOCTYPE html>
<html>
<head>
<title>Student Dashboard</title>

<style>
body{margin:0;font-family:Segoe UI;background:#eef2f7;}
.sidebar{
  width:220px;
  height:100vh;
  background:#0f4c81;
  position:fixed;
  padding-top:30px;
  animation:slideLeft 1s ease;
}
.sidebar a{
  display:block;
  color:white;
  padding:15px;
  text-decoration:none;
}
.sidebar a:hover{
  background:#1b6ca8;
}
.content{
  margin-left:220px;
  padding:40px;
}
.card{
  background:white;
  padding:30px;
  border-radius:10px;
  margin-bottom:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}
@keyframes slideLeft{
  from{transform:translateX(-100%);}
  to{transform:translateX(0);}
}
</style>
</head>

<body>

<div class="sidebar">
<a href="#">Dashboard</a>
<a href="#">Calendar</a>
<a href="#">Hall Ticket</a>
<a href="#">Seating</a>
<a href="Home.html">Logout</a>
</div>

<div class="content">
<h1>Welcome Student</h1>

<div class="card">Upcoming Exams</div>
<div class="card">Approved Events</div>
<div class="card">Notifications</div>

</div>

</body>
</html>
